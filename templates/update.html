<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blogeintrag bearbeiten</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h1>Blogeintrag bearbeiten</h1>

    <p>
        <a href="{{ url_for('index') }}">← Zurück zur Startseite</a>
    </p>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form action="{{ url_for('update', post_id=post['id']) }}" method="POST">

        <label for="author">Autor:</label><br>
        <input
            type="text"
            id="author"
            name="author"
            value="{{ post['author'] }}"
            required
        ><br><br>

        <label for="title">Titel:</label><br>
        <input
            type="text"
            id="title"
            name="title"
            value="{{ post['title'] }}"
            required
        ><br><br>

        <label for="content">Inhalt:</label><br>
        <textarea
            id="content"
            name="content"
            rows="6"
            required
        >{{ post['content'] }}</textarea><br><br>

        <input type="submit" value="Aktualisieren">

    </form>

</body>
</html>
